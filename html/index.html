<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Hello, Cache</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap"
            rel="stylesheet"
        />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --bg: #f5f0e8;
                --ink: #1a1612;
                --muted: #8a7f72;
                --accent: #c94f1e;
                --border: #d5cec4;
            }

            body {
                background: var(--bg);
                color: var(--ink);
                font-family: "Instrument Serif", Georgia, serif;
                min-height: 100vh;
                display: grid;
                place-items: center;
                padding: 2rem;
                overflow-y: auto;
            }

            body::before {
                content: "";
                position: fixed;
                inset: 0;
                background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
                pointer-events: none;
                z-index: 99;
            }

            .card {
                max-width: 560px;
                width: 100%;
                border: 1px solid var(--border);
                padding: 3.5rem 3rem 3rem;
                position: relative;
                animation: rise 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
            }

            .card::after {
                content: "";
                position: absolute;
                inset: 5px -5px -5px 5px;
                border: 1px solid var(--border);
                z-index: -1;
            }

            @keyframes rise {
                from {
                    opacity: 0;
                    transform: translateY(18px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .eyebrow {
                font-family: "DM Mono", monospace;
                font-size: 0.68rem;
                letter-spacing: 0.18em;
                text-transform: uppercase;
                color: var(--accent);
                margin-bottom: 1.4rem;
            }

            h1 {
                font-size: clamp(2.4rem, 6vw, 3.6rem);
                line-height: 1.08;
                font-weight: 400;
                margin-bottom: 1.2rem;
            }

            h1 em {
                font-style: italic;
                color: var(--accent);
            }

            p {
                font-size: 1.05rem;
                line-height: 1.7;
                color: var(--muted);
                margin-bottom: 2rem;
            }

            .meta {
                display: flex;
                gap: 2rem;
                border-top: 1px solid var(--border);
                padding-top: 1.4rem;
                font-family: "DM Mono", monospace;
                font-size: 0.72rem;
                color: var(--muted);
            }

            .meta span {
                display: flex;
                flex-direction: column;
                gap: 0.3rem;
            }
            .meta strong {
                color: var(--ink);
                font-weight: 500;
            }

            #ts {
                font-variant-numeric: tabular-nums;
            }

            .photo {
                width: 100%;
                height: 200px;
                object-fit: cover;
                margin-bottom: 2rem;
                display: block;
            }

            .photo-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 8px;
                margin-bottom: 2rem;
            }

            .photo-grid img {
                width: 100%;
                height: 140px;
                object-fit: cover;
                display: block;
                border: 1px solid var(--border);
            }

            .divider {
                border: none;
                border-top: 1px solid var(--border);
                margin: 2rem 0;
            }

            .section-label {
                font-family: "DM Mono", monospace;
                font-size: 0.65rem;
                letter-spacing: 0.18em;
                text-transform: uppercase;
                color: var(--muted);
                margin-bottom: 0.8rem;
            }

            .video-wrap {
                width: 100%;
                border: 1px solid var(--border);
                overflow: hidden;
                margin-bottom: 2rem;
                background: #e8e2d9;
                display: flex;
                align-items: center;
                justify-content: center;
                height: 200px;
                position: relative;
            }

            .video-wrap video {
                width: 100%;
                height: 100%;
                object-fit: cover;
                display: block;
            }

            .video-placeholder {
                font-family: "DM Mono", monospace;
                font-size: 0.7rem;
                letter-spacing: 0.1em;
                color: var(--muted);
                text-align: center;
                padding: 1rem;
            }
        </style>
    </head>
    <body>
        <article class="card">
            <div class="eyebrow">nginx · reverse proxy</div>
            <img class="photo" src="calamot_hero.jpg" alt="IES El Calamot" />

            <div class="photo-grid">
                <img
                    src="calamot_1.jpg"
                    alt="Image 2"
                    onerror="
                        this.style.background = '#e8e2d9';
                        this.removeAttribute('onerror');
                    "
                />
                <img
                    src="calamot_2.jpg"
                    alt="Image 3"
                    onerror="
                        this.style.background = '#e8e2d9';
                        this.removeAttribute('onerror');
                    "
                />
            </div>

            <hr class="divider" />
            <h1>Served fast,<br /><em>proxied clean.</em></h1>
            <p>
                This page is being reverse proxied through nginx, load balanced across two containers. Requests are
                forwarded transparently to whichever backend is next in the pool.
            </p>
            <div class="section-label">Vídeo</div>
            <div class="video-wrap">
                <!-- Replace src with your video file, e.g. src="video.mp4" -->
                <video controls poster="calamot_hero.jpg">
                    <source src="calamot_3.mp4" type="video/mp4" />
                    <div class="video-placeholder">Place video.mp4 in the same folder</div>
                </video>
            </div>

            <div class="meta">
                <span><strong>Status</strong>200 OK</span>
                <span><strong>Loaded at</strong><time id="ts">—</time></span>
                <span><strong>Mode</strong>Round-robin</span>
            </div>
        </article>

        <script>
            const pad = n => String(n).padStart(2, "0");
            const now = new Date();
            document.getElementById("ts").textContent =
                `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
        </script>
    </body>
</html>
