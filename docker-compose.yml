services:
  website1:
    image: nginx:alpine
    container_name: website1
    restart: unless-stopped
    volumes:
      - ./html:/usr/share/nginx/html:ro
  website2:
    image: nginx:alpine
    container_name: website2
    restart: unless-stopped
    volumes:
      - ./html:/usr/share/nginx/html:ro
  proxy:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./conf/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - website1
      - website2
